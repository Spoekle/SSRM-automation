name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
      fail-fast: false

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          # Extract the section for this version from CHANGELOG.md
          CHANGELOG=$(awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md)
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No changelog entry found for ${TAG}."
          fi
          # Use EOF delimiter for multiline output
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Detect prerelease
        id: prerelease
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *"-alpha"* ]] || [[ "$TAG" == *"-beta"* ]] || [[ "$TAG" == *"-rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Tag: $TAG, Prerelease: $(grep is_prerelease $GITHUB_OUTPUT | cut -d= -f2)"

      - name: Generate GitHub Token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PUBLISHER_APP_ID }}
          private-key: ${{ secrets.PUBLISHER_PRIVATE_KEY }}

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SSRM Automation ${{ github.ref_name }}'
          releaseBody: |
            ## SSRM Automation ${{ github.ref_name }}

            ${{ steps.changelog.outputs.body }}

            ### Installation
            Download the appropriate file for your platform:
            - **Windows**: `.msi` or `.exe` installer
            - **macOS**: `.dmg` file
            - **Linux**: `.AppImage` or `.deb` file

            See the [releases page](https://github.com/Spoekle/SSRM-automation/releases) for more information.
          releaseDraft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          args: ${{ matrix.args }}